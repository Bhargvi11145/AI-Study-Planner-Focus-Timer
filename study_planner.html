<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Study Planner</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
}

.input-box {
    display: flex;
    gap: 10px;
    margin: 20px 0;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #00c9a7;
    color: white;
    cursor: pointer;
}

.subject {
    background: rgba(255,255,255,0.1);
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
}

.timer {
    text-align: center;
    font-size: 40px;
    margin: 20px 0;
}

.progress-bar {
    height: 10px;
    background: #444;
    border-radius: 10px;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 0%;
    background: #00ffcc;
}

.stats {
    margin-top: 20px;
    text-align: center;
}

.quote {
    margin-top: 20px;
    text-align: center;
    font-style: italic;
}
</style>
</head>

<body>

<div class="container">
    <h1>📚 AI Study Planner</h1>

    <div class="input-box">
        <input type="text" id="subjectInput" placeholder="Enter subject...">
        <button onclick="addSubject()">Add</button>
    </div>

    <div id="subjectList"></div>

    <div class="timer" id="timer">25:00</div>
    <button onclick="startTimer()">Start Focus</button>
    <button onclick="resetTimer()">Reset</button>

    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <div class="stats">
        Total Study Time: <b id="time">0</b> mins
    </div>

    <div class="quote" id="quote"></div>
</div>

<script>
let subjects = JSON.parse(localStorage.getItem("subjects")) || [];
let timeLeft = 1500;
let timer;
let totalTime = parseInt(localStorage.getItem("time")) || 0;

const quotes = [
    "Focus beats talent.",
    "Consistency is the key.",
    "Small steps every day.",
    "Discipline = Success.",
    "Work hard in silence."
];

function renderSubjects() {
    const list = document.getElementById("subjectList");
    list.innerHTML = "";

    subjects.forEach((sub, index) => {
        const div = document.createElement("div");
        div.className = "subject";
        div.innerHTML = `${sub} <button onclick="deleteSubject(${index})">❌</button>`;
        list.appendChild(div);
    });

    localStorage.setItem("subjects", JSON.stringify(subjects));
}

function addSubject() {
    const input = document.getElementById("subjectInput");
    if (input.value === "") return;

    subjects.push(input.value);
    input.value = "";
    renderSubjects();
}

function deleteSubject(index) {
    subjects.splice(index, 1);
    renderSubjects();
}

function startTimer() {
    clearInterval(timer);

    timer = setInterval(() => {
        timeLeft--;

        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;

        document.getElementById("timer").innerText =
            `${mins}:${secs < 10 ? "0" : ""}${secs}`;

        let progress = ((1500 - timeLeft) / 1500) * 100;
        document.getElementById("progress").style.width = progress + "%";

        if (timeLeft <= 0) {
            clearInterval(timer);
            totalTime += 25;
            localStorage.setItem("time", totalTime);
            updateStats();
            alert("Session Complete!");
        }
    }, 1000);
}

function resetTimer() {
    clearInterval(timer);
    timeLeft = 1500;
    document.getElementById("timer").innerText = "25:00";
    document.getElementById("progress").style.width = "0%";
}

function updateStats() {
    document.getElementById("time").innerText = totalTime;
}

function showQuote() {
    const random = Math.floor(Math.random() * quotes.length);
    document.getElementById("quote").innerText = quotes[random];
}

renderSubjects();
updateStats();
showQuote();
</script>

</body>
</html>
